<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Graduation Cap Board -->
  <polygon points="40,100 100,60 160,100 100,130" fill="#1a365d"/>
  
  <!-- Cap Base Band -->
  <ellipse cx="100" cy="130" rx="65" ry="20" fill="#1a365d"/>
  
  <!-- Tassel String -->
  <line x1="40" y1="100" x2="25" y2="160" stroke="#1a365d" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Tassel Ball -->
  <circle cx="25" cy="175" r="8" fill="#1a365d"/>
  
  <!-- Airplane Body -->
  <ellipse cx="130" cy="60" rx="20" ry="10" fill="#ffffff" stroke="#1a365d" stroke-width="1.5"/>
  
  <!-- Airplane Nose -->
  <polygon points="150,60 165,60 155,54 155,66" fill="#ffffff" stroke="#1a365d" stroke-width="1.5"/>
  
  <!-- Left Wing -->
  <polygon points="120,55 90,35 95,65" fill="#ffffff" stroke="#1a365d" stroke-width="1.5"/>
  
  <!-- Right Wing -->
  <polygon points="140,55 170,35 165,65" fill="#ffffff" stroke="#1a365d" stroke-width="1.5"/>
  
  <!-- Tail Fin -->
  <polygon points="110,58 95,48 100,72" fill="#ffffff" stroke="#1a365d" stroke-width="1.5"/>
  
  <!-- Motion Lines -->
  <line x1="165" y1="50" x2="180" y2="35" stroke="#1a365d" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="160" y1="70" x2="175" y2="85" stroke="#1a365d" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
</svg>
</svg>
